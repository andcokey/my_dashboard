<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>進行中案件 | 板橋 ダッシュボード（Viewer）</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<header class="app-header">
  <h1>📁 進行中案件</h1>
  <nav class="app-nav"></nav>
</header>
<main>
  <div class="meta-bar"></div>
  <div class="filters">
    <select id="status-filter"></select>
  </div>
  <div id="table-container" class="card"></div>
</main>
<script type="module">
import { renderNav, renderMetaBar, loadJson, renderTable, setupStatusFilter, statusBadge, fmtDate, notionLink, escapeHtml } from "./assets/app.js";
renderNav("matters.html");
renderMetaBar();

const columns = [
  { key: "案件名", label: "案件名", render: (r) => `${escapeHtml(r["案件名"])}<br>${notionLink(r.url)}` },
  { key: "ステータス", label: "ステータス", render: (r) => statusBadge(r["ステータス"]) },
  { key: "優先度", label: "優先度" },
  { key: "担当者", label: "担当者", render: (r) => (r["担当者"] || []).join(", ") },
  { key: "期日", label: "期日", render: (r) => fmtDate(r["期日"]) },
  { key: "ラベル", label: "ラベル", render: (r) => (r["ラベル"] || []).join(", ") },
  { key: "メモ", label: "メモ" },
];

const container = document.getElementById("table-container");

loadJson("matters").then((rows) => {
  renderTable(container, rows, columns);
  setupStatusFilter(document.getElementById("status-filter"), rows, "ステータス", (filtered) =>
    renderTable(container, filtered, columns)
  );
}).catch((e) => {
  container.innerHTML = `<div class="empty-state">読み込みエラー: ${escapeHtml(e.message)}</div>`;
});
</script>
</body>
</html>
